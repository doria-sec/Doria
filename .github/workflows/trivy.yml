name: Trivy Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write # Required to upload Trivy results to the GitHub Security tab

jobs:
  build:
    name: Trivy Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        # Pinned to actions/checkout@v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 

      - name: Run Trivy vulnerability scanner in repo mode
        # Pinned to aquasecurity/trivy-action@v0.36.0 (Your verified SHA)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 
        with:
          scan-type: 'fs'          
          scan-ref: '.'            
          format: 'sarif'          
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results to GitHub Security tab
        # Pinned to github/codeql-action/upload-sarif@v4 template release
        uses: github/codeql-action/upload-sarif@c0fc915677567258ee3c194d03ffe7ae3dc8d741 
        if: always()               
        with:
          sarif_file: 'trivy-results.sarif'

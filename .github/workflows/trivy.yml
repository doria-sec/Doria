name: Trivy Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write # Required to upload Trivy results to GitHub Security tab

jobs:
  build:
    name: Trivy Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        # Pinned to v4.2.2 commit SHA
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 

      - name: Run Trivy vulnerability scanner in repo mode
        # Pinned to a stable release commit SHA instead of @master
        uses: aquasecurity/trivy-action@18f2510ee396bfa406e3ea98592c4e832106a77e 
        with:
          scan-type: 'fs'          
          scan-ref: '.'            
          format: 'sarif'          
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results to GitHub Security tab
        # Pinned to v3 release commit SHA
        uses: github/codeql-action/upload-sarif@4803e9da659dabe478330d1909f33c40ee514d3e 
        if: always()               
        with:
          sarif_file: 'trivy-results.sarif'

name: Trivy Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write # Required to upload Trivy results to GitHub Security tab

jobs:
  build:
    name: Trivy Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'          # Scans the file system directly instead of a Docker image
          scan-ref: '.'            # Scans the current directory
          format: 'sarif'          # Formats results so GitHub can read them
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()               # Ensures results upload even if vulnerabilities are found
        with:
          sarif_file: 'trivy-results.sarif'
